name: Build and Deploy to Vercel (Staging) v3

on:
  push:
    branches: [staging]
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: "3.38.7"
          channel: "stable"
          cache: true

      - name: Create config.json
        working-directory: restodocks_flutter
        run: |
          python3 -c "
          import os, json
          p = 'assets/config.json'
          d = {
            'SUPABASE_URL': os.environ.get('SUPABASE_URL', ''),
            'SUPABASE_ANON_KEY': os.environ.get('SUPABASE_ANON_KEY', ''),
          }
          with open(p, 'w') as f:
            json.dump(d, f)
          print('config.json written')
          "
        env:
          SUPABASE_URL: ${{ secrets.STAGING_SUPABASE_URL }}
          SUPABASE_ANON_KEY: ${{ secrets.STAGING_SUPABASE_ANON_KEY }}

      - name: Flutter pub get
        working-directory: restodocks_flutter
        run: flutter pub get

      - name: Flutter build web
        working-directory: restodocks_flutter
        run: flutter build web --release

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Install Vercel CLI
        run: npm i -g vercel@latest

      - name: Prepare Vercel output
        working-directory: restodocks_flutter
        run: |
          mkdir -p .vercel/output/static
          cp -r build/web/. .vercel/output/static/
          cat > .vercel/output/config.json << 'EOF'
          {"version":3,"routes":[{"handle":"filesystem"},{"src":"/(.*)","dest":"/index.html"}]}
          EOF
          printf '{"projectId":"prj_4FMDqFFqx73cJSoap5uMyO6QSuG2","orgId":"team_l4N4pAZyq8RCmMOLAqatxkUn"}' > .vercel/project.json
          echo "=== .vercel/project.json ==="
          cat .vercel/project.json
          echo "=== output/config.json ==="
          cat .vercel/output/config.json
          echo "=== static files count ==="
          ls .vercel/output/static | wc -l

      - name: Deploy to Vercel
        working-directory: ${{ github.workspace }}
        env:
          VERCEL_TOKEN: ${{ secrets.VERCEL_TOKEN }}
        run: |
          mkdir -p .vercel
          printf '{"projectId":"prj_4FMDqFFqx73cJSoap5uMyO6QSuG2","orgId":"team_l4N4pAZyq8RCmMOLAqatxkUn"}' > .vercel/project.json
          mkdir -p .vercel/output/static
          cp -r restodocks_flutter/.vercel/output/static/. .vercel/output/static/
          cp restodocks_flutter/.vercel/output/config.json .vercel/output/config.json
          vercel deploy --prebuilt --prod --yes --token="$VERCEL_TOKEN"
