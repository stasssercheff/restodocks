name: Build and Deploy to Vercel (Staging)

on:
  push:
    branches: [staging]
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: restodocks_flutter

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: "3.38.7"
          channel: "stable"
          cache: true

      - name: Create config.json
        run: |
          python3 -c "
          import os, json
          p = 'assets/config.json'
          d = {
            'SUPABASE_URL': os.environ.get('SUPABASE_URL', ''),
            'SUPABASE_ANON_KEY': os.environ.get('SUPABASE_ANON_KEY', ''),
          }
          with open(p, 'w') as f:
            json.dump(d, f)
          print('config.json written')
          "
        env:
          SUPABASE_URL: ${{ secrets.STAGING_SUPABASE_URL }}
          SUPABASE_ANON_KEY: ${{ secrets.STAGING_SUPABASE_ANON_KEY }}

      - name: Flutter clean
        run: flutter clean || true

      - name: Flutter pub get
        run: flutter pub get

      - name: Flutter build web
        run: flutter build web --release

      - name: Prepare .vercel/output (Build Output API)
        run: |
          mkdir -p .vercel/output/static
          cp -r build/web/* .vercel/output/static/
          echo '{"version":3,"routes":[{"handle":"filesystem"},{"handle":"miss"},{"src":"/(.*)","dest":"/index.html"}]}' > .vercel/output/config.json

      - name: Write Vercel project config for staging
        run: |
          mkdir -p .vercel
          printf '{"projectId":"%s","orgId":"%s"}' "${{ secrets.VERCEL_STAGING_PROJECT_ID }}" "${{ secrets.VERCEL_ORG_ID }}" > .vercel/project.json
          cat .vercel/project.json

      - name: Setup Node and Vercel CLI
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Install Vercel CLI
        run: npm i -g vercel@latest

      - name: Deploy to Vercel (prebuilt)
        env:
          VERCEL_TOKEN: ${{ secrets.VERCEL_TOKEN }}
          VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
          VERCEL_PROJECT_ID: ${{ secrets.VERCEL_STAGING_PROJECT_ID }}
        run: vercel deploy --prebuilt --prod --token="$VERCEL_TOKEN" --archive=tgz
