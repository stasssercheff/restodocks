name: Build and Deploy to Vercel (Demo/Beta)

on:
  push:
    branches: [staging]
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Check required secrets
        run: |
          echo "Checking GitHub Actions secrets..."
          if [ -z "${{ secrets.STAGING_SUPABASE_URL }}" ]; then echo "ERROR: STAGING_SUPABASE_URL is not set in repo Settings > Secrets"; exit 1; fi
          if [ -z "${{ secrets.STAGING_SUPABASE_ANON_KEY }}" ]; then echo "ERROR: STAGING_SUPABASE_ANON_KEY is not set"; exit 1; fi
          if [ -z "${{ secrets.VERCEL_TOKEN }}" ]; then echo "ERROR: VERCEL_TOKEN is not set"; exit 1; fi
          echo "All secrets OK"

      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: "3.38.7"
          channel: "stable"
          cache: true

      - name: Create config.json
        working-directory: restodocks_flutter
        run: |
          python3 -c "
          import os, json
          p = 'assets/config.json'
          d = {
            'SUPABASE_URL': os.environ.get('SUPABASE_URL', ''),
            'SUPABASE_ANON_KEY': os.environ.get('SUPABASE_ANON_KEY', ''),
          }
          with open(p, 'w') as f:
            json.dump(d, f)
          print('config.json written')
          "
        env:
          SUPABASE_URL: ${{ secrets.STAGING_SUPABASE_URL }}
          SUPABASE_ANON_KEY: ${{ secrets.STAGING_SUPABASE_ANON_KEY }}

      - name: Flutter clean
        working-directory: restodocks_flutter
        run: flutter clean

      - name: Flutter pub get
        working-directory: restodocks_flutter
        run: flutter pub get

      - name: Flutter build web
        working-directory: restodocks_flutter
        env:
          SUPABASE_URL: ${{ secrets.STAGING_SUPABASE_URL }}
          SUPABASE_ANON_KEY: ${{ secrets.STAGING_SUPABASE_ANON_KEY }}
        run: flutter build web --release --verbose --dart-define=SUPABASE_URL="$SUPABASE_URL" --dart-define=SUPABASE_ANON_KEY="$SUPABASE_ANON_KEY"

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Install Vercel CLI
        run: npm i -g vercel@latest

      - name: Deploy to Vercel Demo
        working-directory: ${{ github.workspace }}
        env:
          VERCEL_TOKEN: ${{ secrets.VERCEL_TOKEN }}
          VERCEL_ORG_ID: team_l4N4pAZyq8RCmMOLAqatxkUn
          VERCEL_PROJECT_ID: prj_rSIA3SgwSDWTL0pfYVJTCiGVFAke
        run: |
          mkdir -p .vercel/output/static
          cp -r restodocks_flutter/build/web/. .vercel/output/static/
          printf '{"version":3,"routes":[{"handle":"filesystem"},{"src":"/(.*)","dest":"/index.html"}]}' > .vercel/output/config.json
          mkdir -p .vercel
          printf '{"projectId":"prj_rSIA3SgwSDWTL0pfYVJTCiGVFAke","orgId":"team_l4N4pAZyq8RCmMOLAqatxkUn"}' > .vercel/project.json
          vercel deploy --prebuilt --prod --yes --token="$VERCEL_TOKEN"
