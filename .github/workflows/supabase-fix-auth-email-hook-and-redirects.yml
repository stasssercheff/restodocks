name: Supabase fix auth hook and redirects

on:
  workflow_dispatch:

jobs:
  fix-auth-config:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Ensure jq installed
        run: jq --version

      - name: Patch Supabase Auth config
        env:
          SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}
          SUPABASE_PROJECT_REF: osglfptwbuqqmqunttha
          SUPABASE_SEND_EMAIL_HOOK_SECRET: ${{ secrets.SUPABASE_SEND_EMAIL_HOOK_SECRET }}
        run: bash ./scripts/supabase-fix-auth-email-hook-and-redirects.sh
