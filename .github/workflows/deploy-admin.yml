name: Deploy Admin to Vercel

# DISABLED: Vercel deploys отключены, используется Netlify
on:
  workflow_dispatch:

jobs:
  deploy-beta-admin:
    name: Deploy to restodocks-beta-admin
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: beta-admin
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: beta-admin/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Install Vercel CLI
        run: npm i -g vercel@latest

      - name: Write project.json (beta-admin)
        run: |
          mkdir -p .vercel
          printf '{"projectId":"prj_BOWw9Aqs2ogYrghHjlMFrikuxmhd","orgId":"team_l4N4pAZyq8RCmMOLAqatxkUn","projectName":"restodocks-beta-admin"}' > .vercel/project.json

      - name: Pull settings
        run: vercel pull --yes --environment=production --token="${{ secrets.VERCEL_TOKEN }}"

      - name: Build
        run: vercel build --prod --token="${{ secrets.VERCEL_TOKEN }}"

      - name: Deploy
        run: |
          URL=$(vercel deploy --prebuilt --prod --yes --token="${{ secrets.VERCEL_TOKEN }}")
          vercel alias set "$URL" restodocksadmin-beta.vercel.app --token="${{ secrets.VERCEL_TOKEN }}"

  deploy-admin:
    name: Deploy to restodocks-admin
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: beta-admin
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: beta-admin/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Install Vercel CLI
        run: npm i -g vercel@latest

      - name: Write project.json (admin)
        run: |
          mkdir -p .vercel
          printf '{"projectId":"prj_atTVU1vUPFuP7sf9qEBUaKlkGebx","orgId":"team_l4N4pAZyq8RCmMOLAqatxkUn","projectName":"restodocks-admin"}' > .vercel/project.json

      - name: Pull settings
        run: vercel pull --yes --environment=production --token="${{ secrets.VERCEL_TOKEN }}"

      - name: Build
        run: vercel build --prod --token="${{ secrets.VERCEL_TOKEN }}"

      - name: Deploy
        run: |
          URL=$(vercel deploy --prebuilt --prod --yes --token="${{ secrets.VERCEL_TOKEN }}")
          vercel alias set "$URL" restodocksadmin.vercel.app --token="${{ secrets.VERCEL_TOKEN }}"
