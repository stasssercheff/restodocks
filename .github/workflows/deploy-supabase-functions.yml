name: Deploy Supabase Edge Functions

on:
  push:
    branches: [main, master]
    paths:
      - 'restodocks_flutter/supabase/functions/**'
      - 'supabase/functions/**'
      - '.github/workflows/deploy-supabase-functions.yml'

jobs:
  deploy-production:
    name: Deploy to Production
    runs-on: ubuntu-latest
    env:
      SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}
      PROJECT_REF: osglfptwbuqqmqunttha
    steps:
      - uses: actions/checkout@v4

      - name: Check SUPABASE_ACCESS_TOKEN
        run: |
          if [ -z "$SUPABASE_ACCESS_TOKEN" ]; then
            echo "::error::SUPABASE_ACCESS_TOKEN is not set. Add it in GitHub Settings → Secrets → Actions."
            exit 1
          fi
          echo "Token is set (length=${#SUPABASE_ACCESS_TOKEN})"

      - name: Setup Supabase CLI
        uses: supabase/setup-cli@v1
        with:
          version: latest

      - name: Deploy Edge Functions (Production)
        run: supabase functions deploy --project-ref $PROJECT_REF
        working-directory: restodocks_flutter

  deploy-staging:
    name: Deploy to Staging (Demo)
    runs-on: ubuntu-latest
    continue-on-error: true  # не падать, если Staging в другом аккаунте
    env:
      SUPABASE_ACCESS_TOKEN: ${{ secrets.STAGING_SUPABASE_ACCESS_TOKEN || secrets.SUPABASE_ACCESS_TOKEN }}
      PROJECT_REF: kzhaezanjttvnqkgpxnh
    steps:
      - uses: actions/checkout@v4

      - name: Setup Supabase CLI
        uses: supabase/setup-cli@v1
        with:
          version: latest

      - name: Deploy Edge Functions (Staging)
        run: supabase functions deploy --project-ref $PROJECT_REF
        working-directory: restodocks_flutter
