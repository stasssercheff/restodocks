name: Deploy Supabase Edge Functions

on:
  push:
    branches: [main, master]
    paths:
      - 'restodocks_flutter/supabase/functions/**'
      - 'restodocks_flutter/supabase/config.toml'
      - 'supabase/functions/**'
      - '.github/workflows/deploy-supabase-functions.yml'
  workflow_dispatch:

jobs:
  deploy-production:
    name: Deploy to Production
    runs-on: ubuntu-latest
    env:
      SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}
      PROJECT_REF: osglfptwbuqqmqunttha
    steps:
      - uses: actions/checkout@v4

      - name: Check SUPABASE_ACCESS_TOKEN
        run: |
          if [ -z "$SUPABASE_ACCESS_TOKEN" ]; then
            echo "::error::SUPABASE_ACCESS_TOKEN is not set. Add it in GitHub Settings → Secrets → Actions."
            exit 1
          fi
          echo "Token is set (length=${#SUPABASE_ACCESS_TOKEN})"

      - name: Setup Supabase CLI
        uses: supabase/setup-cli@v1
        with:
          version: latest

      - name: Deploy Edge Functions (Production)
        run: |
          # ai-parse-tech-cards-pdf бандлится в ~33MB и даёт 413 Request Entity Too Large — деплоим без неё
          for dir in supabase/functions/*/; do
            f=$(basename "$dir")
            if [ "$f" = "_shared" ]; then continue; fi
            if [ "$f" = "ai-parse-tech-cards-pdf" ]; then
              echo "::warning::Skipping $f (bundle too large for Supabase Edge limit)"
              continue
            fi
            supabase functions deploy "$f" --project-ref $PROJECT_REF
          done
        working-directory: restodocks_flutter
