name: Security Watchdog

on:
  schedule:
    # Every 2 hours
    - cron: "0 */2 * * *"
  workflow_dispatch:

jobs:
  edge-anon-watchdog:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Run edge anon registration smoke
        id: smoke
        continue-on-error: true
        env:
          SUPABASE_ANON_KEY: ${{ secrets.SUPABASE_ANON_KEY }}
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
        run: |
          set -euo pipefail
          if [ -z "${SUPABASE_ANON_KEY:-}" ]; then
            echo "Missing SUPABASE_ANON_KEY secret" >&2
            exit 1
          fi
          chmod +x scripts/smoke_edge_anon_registration.sh
          ./scripts/smoke_edge_anon_registration.sh

      - name: Run edge status spike watchdog (401/429/5xx)
        id: spikes
        continue-on-error: true
        env:
          SUPABASE_ANON_KEY: ${{ secrets.SUPABASE_ANON_KEY }}
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
        run: |
          set -euo pipefail
          if [ -z "${SUPABASE_ANON_KEY:-}" ]; then
            echo "Missing SUPABASE_ANON_KEY secret" >&2
            exit 1
          fi
          chmod +x scripts/watch_edge_status_spikes.sh
          ./scripts/watch_edge_status_spikes.sh

      - name: Open incident issue on failure
        if: steps.smoke.outcome == 'failure' || steps.spikes.outcome == 'failure'
        uses: actions/github-script@v7
        env:
          SECURITY_ALERT_MENTIONS: ${{ secrets.SECURITY_ALERT_MENTIONS }}
        with:
          script: |
            const title = "Security Watchdog alert: anon registration chain degraded";
            const runUrl = `${context.serverUrl}/${context.repo.owner}/${context.repo.repo}/actions/runs/${context.runId}`;
            const smokeFailed = "${{ steps.smoke.outcome }}" === "failure";
            const spikesFailed = "${{ steps.spikes.outcome }}" === "failure";
            const failedChecks = [
              smokeFailed ? "edge anon smoke" : null,
              spikesFailed ? "edge status spikes (401/429/5xx)" : null
            ].filter(Boolean).join(", ");
            const mentionsRaw = (process.env.SECURITY_ALERT_MENTIONS || "").trim();
            const mentions = mentionsRaw
              .split(/[,\s]+/)
              .map(s => s.trim())
              .filter(Boolean)
              .map(s => s.startsWith("@") ? s : `@${s}`);
            const mentionsLine = mentions.length > 0 ? mentions.join(" ") : "_No SECURITY_ALERT_MENTIONS configured_";
            const body = [
              "Automated watchdog detected a degradation in the edge anon registration chain.",
              "",
              `- Failed checks: ${failedChecks || "unknown"}`,
              `- Responsible: ${mentionsLine}`,
              `- Workflow run: ${runUrl}`,
              `- Branch/ref: ${context.ref}`,
              `- Commit: ${context.sha}`,
              "",
              "Please investigate before next production release."
            ].join("\n");
            const { data: issues } = await github.rest.issues.listForRepo({
              owner: context.repo.owner,
              repo: context.repo.repo,
              state: "open",
              labels: "security-watchdog",
              per_page: 50
            });
            const existing = issues.find(i => i.title === title);
            if (existing) {
              await github.rest.issues.createComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: existing.number,
                body
              });
            } else {
              await github.rest.issues.create({
                owner: context.repo.owner,
                repo: context.repo.repo,
                title,
                body,
                labels: ["security-watchdog", "security", "incident"]
              });
            }

      - name: Fail job if smoke failed
        if: steps.smoke.outcome == 'failure' || steps.spikes.outcome == 'failure'
        run: |
          echo "Security watchdog checks failed."
          exit 1
