<!DOCTYPE html>
<html>
<head>
  <script>
    (function(){
      try {
        var p = '';
        if (location.hash && location.hash.indexOf('#/') === 0) {
          p = location.hash.substring(1).trim();
        } else {
          p = (location.pathname || '').trim();
        }
        if (p && p !== '/' && p !== '/splash') {
          if (p.endsWith('/') && p.length > 1) p = p.slice(0, -1);
          if (location.search && p.indexOf('?') === -1) p += location.search;
          sessionStorage.setItem('restodocks_last_path', p);
          document.documentElement.dataset.initialPath = p;
        }
        // При обновлении (F5) не показывать экран с лого — пользователь уже в приложении
        if (sessionStorage.getItem('restodocks_loaded_before')) {
          var s = document.createElement('style');
          s.textContent = '#loading-screen { display: none !important; }';
          document.head.appendChild(s);
        }
      } catch(e) {}
    })();
  </script>

  <link rel="icon" type="image/png" href="favicon.png"/>

  <script src="theme-icons.js" defer></script>
  <style>
    html, body { margin: 0; padding: 0; width: 100%; height: 100%; overflow: hidden; background: #fff; }
    #loading-screen {
      position: fixed; top: 0; left: 0; width: 100%; height: 100%;
      background: #fff url('welcome_logo.png') center center no-repeat;
      background-size: cover;
      z-index: 9999;
      transition: opacity 0.2s ease;
    }
  </style>
</head>
<body>
  <div id="loading-screen"></div>
  <script src="flutter_bootstrap.js" async></script>
  <script>
    function hideLoadingScreen() {
      try { sessionStorage.setItem('restodocks_loaded_before', '1'); } catch(e) {}
      var el = document.getElementById('loading-screen');
      if (el) el.remove();
    }
    window.addEventListener('flutter-first-frame', hideLoadingScreen);
    // Fallback: detect when Flutter adds its canvas (flt-scene-host) to DOM
    var obs = new MutationObserver(function(mutations, observer) {
      if (document.querySelector('flt-scene-host') || document.querySelector('canvas')) {
        observer.disconnect();
        hideLoadingScreen();
      }
    });
    obs.observe(document.body, { childList: true, subtree: true });
    // Last resort: remove after 20s
    setTimeout(hideLoadingScreen, 20000);
  </script>
  <script>
    // iOS Safari/Chrome: activate ▲▼ keyboard toolbar navigation buttons.
    // Flutter Web (CanvasKit) puts <input> inside Shadow DOM of <flt-text-editing-host>.
    // The only reliable fix: move the active <input> out of shadow DOM into a real <form>
    // in document body when it receives focus, then move it back on blur.
    (function() {
      var FORM_ID = 'flt-ios-nav-form';
      var _placeholder = null; // keeps original position

      function getForm() {
        var f = document.getElementById(FORM_ID);
        if (f) return f;
        f = document.createElement('form');
        f.id = FORM_ID;
        f.setAttribute('onsubmit', 'return false');
        // Position over the original input so Flutter layout stays correct
        f.style.cssText = 'position:fixed;z-index:-1;width:0;height:0;overflow:visible;top:0;left:0;';
        document.body.appendChild(f);
        return f;
      }

      // Recursively search shadow roots for all inputs
      function findInputsInShadow(root) {
        var results = [];
        if (!root) return results;
        try {
          root.querySelectorAll('input, textarea').forEach(function(el) {
            results.push(el);
          });
          root.querySelectorAll('*').forEach(function(el) {
            if (el.shadowRoot) {
              findInputsInShadow(el.shadowRoot).forEach(function(i) { results.push(i); });
            }
          });
        } catch(e) {}
        return results;
      }

      function tagAll() {
        var form = getForm();
        // Tag inputs visible in normal DOM
        document.querySelectorAll('input:not([form]), textarea:not([form])').forEach(function(inp) {
          inp.setAttribute('form', FORM_ID);
        });
        // Tag inputs inside shadow roots (CanvasKit)
        findInputsInShadow(document.body).forEach(function(inp) {
          if (!inp.getAttribute('form')) {
            inp.setAttribute('form', FORM_ID);
          }
        });
      }

      var mo = new MutationObserver(function(mutations) {
        var changed = false;
        mutations.forEach(function(m) {
          if (m.addedNodes.length > 0) changed = true;
        });
        if (changed) setTimeout(tagAll, 50);
      });

      function start() {
        getForm();
        mo.observe(document.body, { childList: true, subtree: true });
        tagAll();
      }

      if (document.readyState === 'loading') {
        document.addEventListener('DOMContentLoaded', start);
      } else {
        start();
      }
      window.addEventListener('flutter-first-frame', function() {
        tagAll();
        setTimeout(tagAll, 300);
        setTimeout(tagAll, 1000);
      });
    })();
  </script>
</body>
</html>
