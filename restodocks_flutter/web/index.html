<!DOCTYPE html>
<html>
<head>
  <script>
    (function(){
      try {
        var p = '';
        if (location.hash && location.hash.indexOf('#/') === 0) {
          p = location.hash.substring(1).trim();
        } else {
          p = (location.pathname || '').trim();
        }
        if (p && p !== '/' && p !== '/splash') {
          if (p.endsWith('/') && p.length > 1) p = p.slice(0, -1);
          if (location.search && p.indexOf('?') === -1) p += location.search;
          // Пишем в ОБА хранилища: sessionStorage сбрасывается при reload на iOS Safari
          sessionStorage.setItem('restodocks_last_path', p);
          localStorage.setItem('restodocks_last_path_persist', p);
          document.documentElement.dataset.initialPath = p;
        } else {
          // pathname == '/' — это reload на iOS. Берём путь из localStorage
          var saved = localStorage.getItem('restodocks_last_path_persist');
          if (saved && saved !== '/' && saved !== '/splash') {
            document.documentElement.dataset.initialPath = saved;
            sessionStorage.setItem('restodocks_last_path', saved);
          }
        }
        // При обновлении (F5) не показывать экран с лого — пользователь уже в приложении
        if (sessionStorage.getItem('restodocks_loaded_before') ||
            localStorage.getItem('restodocks_last_path_persist')) {
          var s = document.createElement('style');
          s.textContent = '#loading-screen { display: none !important; }';
          document.head.appendChild(s);
        }
      } catch(e) {}
    })();
  </script>

  <meta charset="UTF-8">
  <meta content="IE=Edge" http-equiv="X-UA-Compatible">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover, user-scalable=no">
  <meta name="description" content="A new Flutter project.">

  <!-- iOS meta tags & icons -->
  <meta name="mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="apple-mobile-web-app-title" content="restodocks">
  <link rel="apple-touch-icon" href="icons/Icon-192.png">

  <!-- Favicon -->
  <link rel="icon" type="image/png" href="favicon.png"/>

  <title>restodocks</title>
  <link rel="manifest" href="manifest.json">
  <script src="theme-icons.js" defer></script>
  <style>
    html, body { margin: 0; padding: 0; width: 100%; height: 100%; overflow: hidden; background: #fff; }
    #loading-screen {
      position: fixed; top: 0; left: 0; width: 100%; height: 100%;
      background: #fff url('welcome_logo.png') center center no-repeat;
      background-size: cover;
      z-index: 9999;
      transition: opacity 0.2s ease;
    }
  </style>
</head>
<body>
  <div id="loading-screen"></div>
  <script src="flutter_bootstrap.js" async></script>
  <script>
    function hideLoadingScreen() {
      try { sessionStorage.setItem('restodocks_loaded_before', '1'); } catch(e) {}
      var el = document.getElementById('loading-screen');
      if (el) el.remove();
    }
    window.addEventListener('flutter-first-frame', hideLoadingScreen);
    // Fallback: detect when Flutter adds its canvas (flt-scene-host) to DOM
    var obs = new MutationObserver(function(mutations, observer) {
      if (document.querySelector('flt-scene-host') || document.querySelector('canvas')) {
        observer.disconnect();
        hideLoadingScreen();
      }
    });
    obs.observe(document.body, { childList: true, subtree: true });
    // Last resort: remove after 20s
    setTimeout(hideLoadingScreen, 20000);
  </script>
  <script>
    // iOS Safari/Chrome: inject ▲▼ navigation buttons above the keyboard.
    // These buttons appear only when a numeric input is focused and allow
    // moving to the prev/next input. Uses touchstart (synchronous) so that
    // iOS WebKit allows the programmatic focus() call.
    (function() {
      // Only inject on iOS / touch devices
      var isIOS = /iphone|ipad|ipod/i.test(navigator.userAgent) ||
                  (navigator.platform === 'MacIntel' && navigator.maxTouchPoints > 1);
      if (!isIOS) return;

      var bar = null;
      var activeInput = null;
      var allInputs = [];
      var hideTimer = null;

      function getAllInputs() {
        // Collect from normal DOM and shadow roots
        var result = [];
        function collect(root) {
          try {
            root.querySelectorAll('input[type="number"], input[inputmode="numeric"], input[inputmode="decimal"], input[type="text"]')
              .forEach(function(el) { result.push(el); });
            root.querySelectorAll('*').forEach(function(el) {
              if (el.shadowRoot) collect(el.shadowRoot);
            });
          } catch(e) {}
        }
        collect(document);
        return result;
      }

      function createBar() {
        if (bar) return;
        bar = document.createElement('div');
        bar.id = 'flt-nav-bar';
        bar.style.cssText = [
          'position:fixed',
          'bottom:0',
          'left:0',
          'right:0',
          'height:44px',
          'background:#d1d5db',
          'display:none',
          'align-items:center',
          'padding:0 12px',
          'gap:8px',
          'z-index:999999',
          'box-sizing:border-box',
          '-webkit-user-select:none',
          'user-select:none',
        ].join(';');

        var btnStyle = [
          'width:40px',
          'height:32px',
          'border:none',
          'border-radius:6px',
          'background:#fff',
          'font-size:18px',
          'line-height:1',
          'cursor:pointer',
          'display:flex',
          'align-items:center',
          'justify-content:center',
          '-webkit-tap-highlight-color:transparent',
        ].join(';');

        var btnPrev = document.createElement('button');
        btnPrev.type = 'button';
        btnPrev.innerHTML = '&#8679;';
        btnPrev.style.cssText = btnStyle;

        var btnNext = document.createElement('button');
        btnNext.type = 'button';
        btnNext.innerHTML = '&#8681;';
        btnNext.style.cssText = btnStyle;

        // touchstart is synchronous — iOS allows focus() here
        btnPrev.addEventListener('touchstart', function(e) {
          e.preventDefault();
          navigate(-1);
        }, {passive: false});

        btnNext.addEventListener('touchstart', function(e) {
          e.preventDefault();
          navigate(1);
        }, {passive: false});

        // mousedown fallback for desktop testing
        btnPrev.addEventListener('mousedown', function(e) { e.preventDefault(); navigate(-1); });
        btnNext.addEventListener('mousedown', function(e) { e.preventDefault(); navigate(1); });

        bar.appendChild(btnPrev);
        bar.appendChild(btnNext);
        document.body.appendChild(bar);
      }

      function navigate(dir) {
        allInputs = getAllInputs();
        var idx = allInputs.indexOf(activeInput);
        if (idx < 0 && activeInput) {
          // Try matching by value/position
          idx = 0;
        }
        var next = allInputs[idx + dir];
        if (next) {
          next.focus();
          try { next.select(); } catch(e) {}
          activeInput = next;
        }
      }

      function showBar() {
        if (!bar) createBar();
        clearTimeout(hideTimer);
        bar.style.display = 'flex';
      }

      function scheduleHide() {
        clearTimeout(hideTimer);
        hideTimer = setTimeout(function() {
          if (bar) bar.style.display = 'none';
        }, 300);
      }

      function attachToShadowHosts() {
        // Flutter CanvasKit puts inputs inside shadow DOM of flt-text-editing-host
        document.querySelectorAll('flt-text-editing-host, flt-glass-pane').forEach(function(host) {
          if (host._navListened) return;
          host._navListened = true;
          var root = host.shadowRoot || host;
          root.addEventListener('focusin', function(e) {
            var t = e.target;
            if (t && t.tagName === 'INPUT') {
              activeInput = t;
              allInputs = getAllInputs();
              showBar();
            }
          }, true);
          root.addEventListener('focusout', function(e) {
            scheduleHide();
          }, true);
        });
      }

      // Also listen on document for HTML renderer inputs (not in shadow DOM)
      document.addEventListener('focusin', function(e) {
        var t = e.target;
        if (t && t.tagName === 'INPUT') {
          activeInput = t;
          allInputs = getAllInputs();
          showBar();
        }
      }, true);
      document.addEventListener('focusout', function(e) {
        scheduleHide();
      }, true);

      // Watch for Flutter shadow hosts appearing in DOM
      var hostObserver = new MutationObserver(function() {
        attachToShadowHosts();
      });

      window.addEventListener('flutter-first-frame', function() {
        createBar();
        attachToShadowHosts();
        hostObserver.observe(document.body, { childList: true, subtree: true });
      });
    })();
  </script>
</body>
</html>
