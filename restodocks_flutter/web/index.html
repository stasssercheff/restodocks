<!DOCTYPE html>
<html>
<head>
  <!--
    If you are serving your web app in a path other than the root, change the
    href value below to reflect the base path you are serving from.

    The path provided below has to start and end with a slash "/" in order for
    it to work correctly.

    For more details:
    * https://developer.mozilla.org/en-US/docs/Web/HTML/Element/base

    This is a placeholder for base href that will be replaced by the value of
    the `--base-href` argument provided to `flutter build`.
  -->
  <base href="$FLUTTER_BASE_HREF">

  <meta charset="UTF-8">
  <meta content="IE=Edge" http-equiv="X-UA-Compatible">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover, user-scalable=no">
  <meta name="description" content="A new Flutter project.">

  <!-- iOS meta tags & icons -->
  <meta name="mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="apple-mobile-web-app-title" content="restodocks">
  <link rel="apple-touch-icon" href="icons/Icon-192.png">

  <!-- Favicon -->
  <link rel="icon" type="image/png" href="favicon.png"/>

  <title>restodocks</title>
  <link rel="manifest" href="manifest.json">
  <script src="theme-icons.js" defer></script>
  <style>
    html, body { margin: 0; padding: 0; width: 100%; height: 100%; overflow: hidden; background: #fff; }
    #loading-screen {
      position: fixed; top: 0; left: 0; width: 100%; height: 100%;
      background: #fff url('welcome_logo.png') center center no-repeat;
      background-size: contain;
      z-index: 9999;
      transition: opacity 0.2s ease;
    }
  </style>
</head>
<body>
  <div id="loading-screen"></div>
  <script src="flutter_bootstrap.js" async></script>
  <script>
    function hideLoadingScreen() {
      var el = document.getElementById('loading-screen');
      if (el) el.remove();
    }
    window.addEventListener('flutter-first-frame', hideLoadingScreen);
    // Fallback: detect when Flutter adds its canvas (flt-scene-host) to DOM
    var obs = new MutationObserver(function(mutations, observer) {
      if (document.querySelector('flt-scene-host') || document.querySelector('canvas')) {
        observer.disconnect();
        hideLoadingScreen();
      }
    });
    obs.observe(document.body, { childList: true, subtree: true });
    // Last resort: remove after 20s
    setTimeout(hideLoadingScreen, 20000);
  </script>
</body>
</html>
