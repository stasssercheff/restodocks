<!DOCTYPE html>
<html lang="en">
<head>
  <script>
    (function(){
      try {
        var p = '';
        if (location.hash && location.hash.indexOf('#/') === 0) {
          p = location.hash.substring(1).trim();
        } else {
          p = (location.pathname || '').trim();
        }
        if (p && p !== '/' && p !== '/splash') {
          if (p.endsWith('/') && p.length > 1) p = p.slice(0, -1);
          if (location.search && p.indexOf('?') === -1) p = p + location.search;
          var skipSave = p.indexOf('/login') === 0 || p.indexOf('/confirm-email') === 0 || p.indexOf('/auth/confirm') === 0;
          if (!skipSave) {
            sessionStorage.setItem('restodocks_last_path', p);
            localStorage.setItem('restodocks_last_path_persist', p);
          }
          document.documentElement.dataset.initialPath = p;
        } else {
          var saved = localStorage.getItem('restodocks_last_path_persist');
          if (saved && saved !== '/' && saved !== '/splash' && saved.indexOf('/login') !== 0 && saved.indexOf('/confirm-email') !== 0 && saved.indexOf('/auth/confirm') !== 0) {
            document.documentElement.dataset.initialPath = saved;
            sessionStorage.setItem('restodocks_last_path', saved);
          }
        }
        // Не скрывать loading-screen до загрузки Flutter — иначе белый экран вместо логотипа
      } catch(e) {}
    })();
  </script>

  <div id="loading-screen"></div>
  <script>
    (function () {
      // Force-drop stale SW/caches so web always loads the latest splash/assets.
      async function clearStaleWebCache() {
        try {
          if ('serviceWorker' in navigator) {
            const regs = await navigator.serviceWorker.getRegistrations();
            await Promise.all(regs.map((r) => r.unregister()));
          }
          if ('caches' in window) {
            const keys = await caches.keys();
            await Promise.all(
              keys
                .filter((k) => /flutter|workbox|app|manifest|asset/i.test(k))
                .map((k) => caches.delete(k))
            );
          }
        } catch (_) {}
      }

      async function loadFlutterBootstrap() {
        await clearStaleWebCache();
        var s = document.createElement('script');
        s.src = 'flutter_bootstrap.js?v=20260403i';
        s.async = true;
        document.body.appendChild(s);
      }

      loadFlutterBootstrap();
    })();
  </script>
  <script>
    function hideLoadingScreen() {
      try { sessionStorage.setItem('restodocks_loaded_before', '1'); } catch(e) {}
      var el = document.getElementById('loading-screen');
      if (!el) return;
      // Wait until at least the next painted frames to avoid white flash between
      // HTML splash and first stable Flutter frame.
      requestAnimationFrame(function () {
        requestAnimationFrame(function () {
          el.classList.add('fade-out');
          setTimeout(function () { if (el && el.parentNode) el.remove(); }, 220);
        });
      });
    }
    window.addEventListener('flutter-first-frame', hideLoadingScreen);
    // Do not hide by canvas mutation: it may fire before first painted frame and causes white flash.
    // Last resort: remove after 20s
    setTimeout(hideLoadingScreen, 20000);
  </script>
  <script>
    // iOS Safari/Chrome: кнопки ▲▼ над клавиатурой.
    // Кнопки удерживают клавиатуру на экране и вызывают window._flutterNav(±1),
    // который Flutter регистрирует на экране iiko-инвентаризации.
    // Переход между ячейками происходит через FocusNode.requestFocus() в Dart.
    (function () {
      var isTouch = ('ontouchstart' in window) || navigator.maxTouchPoints > 0;
      if (!isTouch) return;

      var bar, hideTimer;

      function createBar() {
        if (bar) return;
        bar = document.createElement('div');
        bar.style.cssText = [
          'position:fixed', 'bottom:0', 'left:0', 'right:0', 'height:44px',
          'background:#d1d5db', 'display:none', 'align-items:center',
          'padding:0 12px', 'gap:8px', 'z-index:999999', 'box-sizing:border-box',
          '-webkit-user-select:none', 'user-select:none'
        ].join(';');

        var btnStyle = [
          'width:44px', 'height:34px', 'border:none', 'border-radius:6px',
          'background:#fff', 'font-size:20px', 'cursor:pointer',
          'display:flex', 'align-items:center', 'justify-content:center',
          '-webkit-tap-highlight-color:transparent'
        ].join(';');

        ['▲', '▼'].forEach(function (label, i) {
          var btn = document.createElement('button');
          btn.type = 'button';
          btn.textContent = label;
          btn.style.cssText = btnStyle;
          var dir = i === 0 ? -1 : 1;
          // touchstart синхронный — iOS разрешает focus() внутри
          btn.addEventListener('touchstart', function (e) {
            e.preventDefault();
            if (typeof window._flutterNav === 'function') window._flutterNav(dir);
          }, { passive: false });
          btn.addEventListener('mousedown', function (e) {
            e.preventDefault();
            if (typeof window._flutterNav === 'function') window._flutterNav(dir);
          });
          bar.appendChild(btn);
        });

        document.body.appendChild(bar);
      }

      function showBar() {
        if (!bar) createBar();
        clearTimeout(hideTimer);
        bar.style.display = 'flex';
      }

      function scheduleHide() {
        clearTimeout(hideTimer);
        hideTimer = setTimeout(function () {
          if (bar) bar.style.display = 'none';
        }, 300);
      }

      // Слушаем focusin/focusout на весь документ + shadow-хосты Flutter
      document.addEventListener('focusin', function (e) {
        if (e.target && e.target.tagName === 'INPUT') showBar();
      }, true);
      document.addEventListener('focusout', scheduleHide, true);

      function attachShadowListeners() {
        document.querySelectorAll('flt-text-editing-host, flt-glass-pane, flt-scene').forEach(function (host) {
          if (host._rdNavAttached) return;
          host._rdNavAttached = true;
          var root = host.shadowRoot || host;
          root.addEventListener('focusin', function (e) {
            if (e.target && e.target.tagName === 'INPUT') showBar();
          }, true);
          root.addEventListener('focusout', scheduleHide, true);
        });
      }

      window.addEventListener('flutter-first-frame', function () {
        createBar();
        attachShadowListeners();
        new MutationObserver(attachShadowListeners)
          .observe(document.body, { childList: true, subtree: true });
      });
    })();
  </script>
