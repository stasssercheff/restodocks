# Edge Functions configuration for Restodocks
# See: https://supabase.com/docs/guides/functions/function-configuration

# send-email вызывается из приложения при отправке заказа на почту.
# Сотрудники входят через authenticate-employee (legacy) — у них нет Supabase Auth JWT.
# С verify_jwt=true шлюз Supabase возвращает 403 до вызова функции.
# Безопасность: функция сама проверяет anon/service_role key (см. send-email/index.ts).
[functions.send-email]
verify_jwt = false

# save-checklist — то же: legacy-логин без JWT
[functions.save-checklist]
verify_jwt = false

# authenticate-employee — legacy-логин, сотрудники без Supabase Auth JWT
[functions.authenticate-employee]
verify_jwt = false

# send-registration-email: как send-email, anon key с Cloudflare может не совпадать
[functions.send-registration-email]
verify_jwt = false

# register-metadata: только anon до входа владельца; проверка доступа к establishment в handler
[functions.register-metadata]
verify_jwt = false

# auth-send-email: Auth Hook, вызывается Supabase Auth
[functions.auth-send-email]
verify_jwt = false

# parse-ttk-by-templates: парсинг ТТК по шаблонам (service_role, без AI)
[functions.parse-ttk-by-templates]
verify_jwt = false

# tt-parse-save-learning: обучение парсера ТТК (service_role, обход RLS)
[functions.tt-parse-save-learning]
verify_jwt = false

# fetch-nutrition-off: прокси к Open Food Facts (обход CORS/504 в DevTools)
[functions.fetch-nutrition-off]
verify_jwt = false

# get-training-video-url: URL видео по IP — RU → Supabase Storage, остальные → YouTube
[functions.get-training-video-url]
verify_jwt = false

# log-system-error: запись в system_errors (anon JWT или service role в apikey)
[functions.log-system-error]
verify_jwt = false

# auto-translate-product: вызывается из приложения и скриптов batch_translate (anon key)
[functions.auto-translate-product]
verify_jwt = false

# translate-text: DeepL; функция сама проверяет apikey/JWT (security.ts). Иначе шлюз режет 401 до тела запроса.
[functions.translate-text]
verify_jwt = false

# auth-password-proxy: web вход через серверный fetch к GoTrue (обход 522 на прямом auth/v1/token из браузера)
[functions.auth-password-proxy]
verify_jwt = false

# push-inbox-dispatch: Database Webhook → FCM; авторизация через PUSH_WEBHOOK_SECRET в заголовке
[functions.push-inbox-dispatch]
verify_jwt = false

# purge-establishment-auth-queue: JWT владельца (initiator) + purge_token из RPC delete_establishment_by_owner
[functions.purge-establishment-auth-queue]
verify_jwt = true
